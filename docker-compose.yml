services:
  postgres:
    image: ruvnet/ruvector-postgres:latest
    environment:
      POSTGRES_USER: grover
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grover}
      POSTGRES_DB: grover
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/01-keycloak-db.sh:/docker-entrypoint-initdb.d/01-keycloak-db.sh
      - ./config/init.sql:/docker-entrypoint-initdb.d/02-grover-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grover -d grover"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grover-net
    restart: unless-stopped

  grover:
    build: .
    ports:
      - "${GROVER_PORT:-3000}:3000"
    env_file: .env
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgres://grover:${POSTGRES_PASSWORD:-grover}@postgres:5432/grover
    volumes:
      - ./corpus:/app/corpus:ro
      - ./index:/app/index
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - grover-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-grover}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grover-net
    restart: unless-stopped

networks:
  grover-net:
    driver: bridge

volumes:
  postgres_data:
