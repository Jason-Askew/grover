<style>
  .chat-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 420px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    background: #F3F4F6;
    border-left: 1px solid #ddd;
  }
  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chat-header h2 {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin: 0;
  }
  .chat-header button {
    background: none; border: none;
    color: #888; cursor: pointer;
    font-family: 'Inter', sans-serif;

  .chat-header select {

    outline: none;

  }
  .chat-header select:hover { border-color: #999; }
  .chat-header select:focus { border-color: #2a5a9a; }
  .chat-header-controls {

  }

  .chat-messages {
    flex: 1;

  .chat-msg {
    padding: 10px 14px;

    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #e8e8e8;
    font-size: 10px;

    font-family: 'Inter', sans-serif;
  }

  .chat-msg.system {
    background: transparent;
    color: #aaa;
    font-size: 11px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    align-self: center;
    padding: 4px;
  }

  .chat-input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 8px;
  }
  .chat-input-area input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #333;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input-area input:focus { border-color: #2a5a9a; }
  .chat-input-area input::placeholder { color: #bbb; }
  .chat-input-area button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #2a5a9a;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: background 0.15s;
  }
  .chat-input-area button:hover { background: #3a7bd5; }
  .chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing-indicator {
    display: none;
    align-self: flex-start;
    padding: 8px 14px;
    font-size: 12px;
    color: #999;
    font-family: 'Inter', sans-serif;
  }
  .typing-indicator.visible { display: block; }
  .typing-indicator span {
    animation: blink 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,60%,100% { opacity: 0.2; } 30% { opacity: 1; } }

  .mic-btn {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #888;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .mic-btn svg { width: 16px; height: 16px; }
  .mic-btn:hover { color: #333; border-color: #999; }
  .mic-btn.recording {
    background: #e74c3c;
    border-color: #c0392b;
    color: #fff;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .mic-btn.processing {
    background: #f39c12;
    border-color: #e67e22;
    color: #fff;
    opacity: 0.7;
    cursor: wait;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
  }

  .speaker-btn {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #888;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .speaker-btn svg { width: 16px; height: 16px; }
  .speaker-btn:hover { color: #333; border-color: #999; }
  .speaker-btn.active { color: #2a5a9a; border-color: #2a5a9a; }

  .index-selector-bar {
    position: fixed;
    top: 12px; left: 290px;
    z-index: 300;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
  }
  .index-selector-bar label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
  }
  .index-selector-bar select {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #333;
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    outline: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: border-color 0.15s;

  .index-selector-bar select:hover { border-color: #999; }
  .index-selector-bar select:focus { border-color: #2a5a9a; }

  .feedback-bar {

    font-size: 10px;
    color: #aaa;
  }
  .feedback-bar span { margin-right: 2px; }
  .feedback-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    font-size: 12px;
    color: #888;
    transition: all 0.15s;
    line-height: 1;
  }
  .feedback-btn:hover { border-color: #999; color: #333; }
  .feedback-btn.selected {
    border-color: #2a5a9a;
    color: #2a5a9a;
    cursor: default;
  }
  .feedback-confirmed {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #aaa;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid #e8e8e8;
  }
  .feedback-form {
    margin-top: 8px;
    padding: 10px;
    background: #f9f9f9;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #555;
  }
  .feedback-form label {
    display: block;
    padding: 4px 0;
    cursor: pointer;
  }
  .feedback-form input[type="radio"] { margin-right: 6px; }
  .feedback-form textarea {
    width: 100%;
    margin-top: 6px;
    padding: 6px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    resize: vertical;
    min-height: 40px;
    box-sizing: border-box;
  }
  .feedback-form button {
    margin-top: 8px;
    padding: 5px 14px;
    border: none;
    border-radius: 4px;
    background: #2a5a9a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .feedback-form button:hover { background: #3a7bd5; }
  .feedback-form button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Adjust graph area for chat panel */
  #graph-container { left: 280px; right: 420px; }
  .control-panel { z-index: 50; }
</style>

<div class="index-selector-bar">
  <label>Source:</label>
  <select id="index-selector" onchange="switchIndex(this.value)"></select>
  <button class="cp-memory-btn" id="cp-memory-btn" onclick="toggleMemoryGraph()" title="Toggle memory graph">Memory</button>
</div>

<div class="chat-panel">
  <div class="chat-header">
    <div class="chat-header-controls">
      <span id="user-name" style="font-family:'Inter',sans-serif;font-size:11px;color:#2a5a9a;font-weight:500;display:none;"></span>
      <button id="signout-btn" onclick="signOut()" style="display:none;">Sign out</button>
      <button onclick="clearChat()">Clear</button>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-msg system" id="chat-welcome">Ask a question about the knowledge base</div>
  </div>
  <div class="typing-indicator" id="typing">
    Searching<span>.</span><span>.</span><span>.</span>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Ask a question..." />
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Voice input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <button class="speaker-btn" id="speaker-toggle" onclick="toggleTts()" title="Toggle voice output"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15" class="speaker-off"/><line x1="17" y1="9" x2="23" y2="15" class="speaker-off"/></svg></button>
    <button id="chat-send" onclick="sendMessage()">Ask</button>
  </div>
</div>

<script>
// ── Chat Logic ──────────────────────────────────────────

const chatInput = document.getElementById('chat-input');
const chatMessages = document.getElementById('chat-messages');
const chatSend = document.getElementById('chat-send');
const typingEl = document.getElementById('typing');
const indexSelector = document.getElementById('index-selector');

let activeChatId = null;

// ── Chat list management ─────────────────────────────────

async function loadChats() {
  try {
    const resp = await fetch('/api/chats');
    const data = await resp.json();
    activeChatId = data.activeChatId;
    renderChatList(data.chats, activeChatId);
  } catch (e) {
    console.error('Failed to load chats:', e);
  }
}

function renderChatList(chats, activeId) {
  const list = document.getElementById('cp-chat-list');
  if (!list) return;
  list.innerHTML = chats.map(c => {
    const isActive = c.id === activeId;
    const d = new Date(c.lastActivityAt || c.createdAt);
    const date = d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const title = c.title || 'New Chat';
    const safeTitle = title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const safeId = c.id.replace(/"/g, '&quot;');
    return '<div class="cp-chat-item' + (isActive ? ' active' : '') + '" data-chat-id="' + safeId + '" onclick="switchChatTo(\'' + safeId + '\')">' +
      '<button class="cp-chat-delete" onclick="event.stopPropagation();deleteChatItem(\'' + safeId + '\')" title="Delete">&times;</button>' +
      '<div class="cp-chat-item-title" ondblclick="event.stopPropagation();startRenameChat(\'' + safeId + '\',this)" title="Double-click to rename">' + safeTitle + '</div>' +
      '<div class="cp-chat-item-date">' + date + '</div>' +
    '</div>';
  }).join('');
}

async function switchChatTo(chatId) {
  if (chatId === activeChatId) return;
  try {
    await fetch('/api/chats/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId }),
    });
    activeChatId = chatId;
    await loadChats();
    await loadChatHistory(chatId);
    // Clear cached memories so memory viewer reloads for new chat
    if (typeof cachedMemories !== 'undefined') cachedMemories = null;
    // If memory graph is active, refresh it for the new chat
    if (typeof memoryGraphActive !== 'undefined' && memoryGraphActive) {
      toggleMemoryGraph(); // exit
      toggleMemoryGraph(); // re-enter with new chatId
    }
    if (typeof clearPath === 'function') clearPath();
  } catch (e) {
    addMessage('system', 'Failed to switch chat: ' + e.message);
  }
}

async function createNewChat() {
  try {
    const resp = await fetch('/api/chats', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await resp.json();
    activeChatId = data.chat.id;
    chatMessages.innerHTML = '';
    const name = indexSelector.value || 'the knowledge base';
    addMessage('system', 'Ask a question about ' + name);
    await loadChats();
    if (typeof clearPath === 'function') clearPath();
  } catch (e) {
    addMessage('system', 'Failed to create chat');
  }
}

async function deleteChatItem(chatId) {
  try {
    const resp = await fetch('/api/chats?id=' + encodeURIComponent(chatId), { method: 'DELETE' });
    const data = await resp.json();
    if (chatId === activeChatId) {
      activeChatId = data.activeChatId || null;
      chatMessages.innerHTML = '';
      if (activeChatId) {
        await loadChatHistory(activeChatId);
      } else {
        addMessage('system', 'Chat deleted');
      }
    }
    await loadChats();
  } catch (e) {
    addMessage('system', 'Failed to delete chat');
  }
}

function startRenameChat(chatId, titleEl) {
  const current = titleEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current === 'New Chat' ? '' : current;
  input.style.cssText = 'width:100%;font-family:Inter,sans-serif;font-size:12px;padding:1px 4px;border:1px solid #4a8eda;border-radius:3px;outline:none;box-sizing:border-box;';
  titleEl.textContent = '';
  titleEl.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const newTitle = input.value.trim() || current;
    titleEl.textContent = newTitle;
    if (newTitle !== current) {
      fetch('/api/chats/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatId, title: newTitle }),
      }).then(() => loadChats()).catch(() => { titleEl.textContent = current; });
    }
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

async function loadChatHistory(chatId) {
  chatMessages.innerHTML = '';
  try {
    const resp = await fetch('/api/chats/history?chatId=' + encodeURIComponent(chatId));
    const data = await resp.json();
    if (data.history && data.history.length > 0) {
      for (const msg of data.history) {
        let extraHtml = '';
        if (msg.role === 'assistant' && msg.sources && msg.sources.length > 0) {
          extraHtml = buildSourcesHtml(msg.sources);
        }
        addMessage(msg.role, msg.content, extraHtml);
      }
    } else {
      const name = indexSelector.value || 'the knowledge base';
      addMessage('system', 'Ask a question about ' + name);
    }
  } catch (e) {
    addMessage('system', 'Failed to load history');
  }
}

// Load available indexes on startup
(async function loadIndexes() {
  try {
    const resp = await fetch('/api/indexes');
    const indexes = await resp.json();
    indexSelector.innerHTML = '';
    let activeName = '';
    for (const idx of indexes) {
      const opt = document.createElement('option');
      opt.value = idx.name;
      opt.textContent = idx.name + ' (' + idx.chunks + ' chunks)';
      if (idx.active) { opt.selected = true; activeName = idx.name; }
      indexSelector.appendChild(opt);
    }
    const welcome = document.getElementById('chat-welcome');
    if (welcome && activeName) welcome.textContent = 'Ask a question about ' + activeName;
  } catch (e) {
    console.error('Failed to load indexes:', e);
  }
  // Load chat list after indexes are ready
  await loadChats();
  if (activeChatId) await loadChatHistory(activeChatId);
})();

async function switchIndex(name) {
  chatSend.disabled = true;
  indexSelector.disabled = true;
  addMessage('system', 'Switching to ' + name + '...');
  try {
    const resp = await fetch('/api/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: name }),
    });
    const data = await resp.json();
    if (data.error) {
      addMessage('system', 'Error: ' + data.error);
    } else {
      // Reload graph with new viz data
      if (data.vizData && typeof initGraph === 'function') {
        initGraph(data.vizData);
      }
      chatMessages.innerHTML = '';
      addMessage('system', 'Ask a question about ' + name);
      // Refresh chat list for new index
      await loadChats();
    }
  } catch (e) {
    addMessage('system', 'Switch failed: ' + e.message);
  }
  chatSend.disabled = false;
  indexSelector.disabled = false;
}

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function sendMessage() {
  const query = chatInput.value.trim();
  if (!query) return;

  chatInput.value = '';
  chatSend.disabled = true;

  // Add user message
  addMessage('user', query);

  // Show typing
  typingEl.classList.add('visible');
  chatMessages.scrollTop = chatMessages.scrollHeight;

  try {
    const resp = await fetch('/api/ask-stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, chatId: activeChatId }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      typingEl.classList.remove('visible');
      addMessage('system', 'Error: ' + (err.error || resp.statusText));
      chatSend.disabled = false;
      return;
    }

    // Create the assistant message div for streaming into
    const msgDiv = document.createElement('div');
    msgDiv.className = 'chat-msg assistant';
    chatMessages.appendChild(msgDiv);
    typingEl.classList.remove('visible');

    let fullAnswer = '';
    let sources = [];
    let vizPath = null;
    let memoryId = null;

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let eventType = '';

    function processSSELines(lines) {
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const data = line.slice(6);
          try {
            const parsed = JSON.parse(data);
            if (eventType === 'sources') {
              sources = parsed;
            } else if (eventType === 'token') {
              fullAnswer += parsed;
              msgDiv.innerHTML = formatAnswer(fullAnswer);
              chatMessages.scrollTop = chatMessages.scrollHeight;
              onStreamToken(parsed);
            } else if (eventType === 'done') {
              vizPath = parsed.path;
              memoryId = parsed.memoryId || null;
            } else if (eventType === 'error') {
              addMessage('system', 'Error: ' + parsed.error);
            }
          } catch (e) { /* skip malformed */ }
          eventType = '';
        }
      }
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      processSSELines(lines);
    }

    // Process any remaining data in the buffer
    if (buffer.trim()) {
      processSSELines(buffer.split('\n'));
    }

    // Final render with sources
    msgDiv.innerHTML = formatAnswer(fullAnswer) + buildSourcesHtml(sources);

    // Add feedback bar
    if (memoryId) {
      msgDiv.dataset.memoryId = memoryId;
      const feedbackBar = document.createElement('div');
      feedbackBar.className = 'feedback-bar';
      feedbackBar.innerHTML =
        '<span>Helpful?</span>' +
        '<button class="feedback-btn" onclick="submitFeedback(this, \'positive\')" title="Good answer">&#9650;</button>' +
        '<button class="feedback-btn" onclick="submitFeedback(this, \'negative\')" title="Bad answer">&#9660;</button>';
      msgDiv.appendChild(feedbackBar);
    }

    // Highlight graph path
    if (vizPath && typeof highlightPath === 'function') {
      highlightPath(vizPath);
    }

    // Flush any remaining TTS text
    flushTtsBuffer();

    // Refresh chat list to pick up auto-title
    loadChats();

  } catch (e) {
    typingEl.classList.remove('visible');
    addMessage('system', 'Connection error: ' + e.message);
  }

  chatSend.disabled = false;
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function formatAnswer(text) {
  return renderMarkdown(text);
}

function buildSourcesHtml(sources) {
  if (!sources || sources.length === 0) return '';
  return '<div class="sources">' +
    sources.map(s => {
      const pg = s.pageStart === s.pageEnd ? 'p.' + s.pageStart : 'pp.' + s.pageStart + '-' + s.pageEnd;
      const label = s.file.replace(/\.md$/, '').split('/').pop();
      const safeFile = s.file.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
      const safeLabel = label.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const idx = s.index || '';
      if (s.url) {
        const safeUrl = s.url.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        return '<div data-doc="doc:' + safeFile + '" data-url="' + safeUrl + '">[' + idx + '] ' + safeLabel + ' (' + pg + ') \u2197</div>';
      }
      return '<div data-doc="doc:' + safeFile + '">[' + idx + '] ' + safeLabel + ' (' + pg + ')</div>';
    }).join('') +
    '</div>';
}

function addMessage(role, text, extraHtml = '') {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.innerHTML = renderMarkdown(text) + extraHtml;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Event delegation for source clicks — open URL if available, else focus graph node
chatMessages.addEventListener('click', function(e) {
  const sourceEl = e.target.closest('[data-doc]');
  if (sourceEl) {
    if (sourceEl.dataset.url) {
      window.open(sourceEl.dataset.url, '_blank');
    } else {
      focusNode(sourceEl.dataset.doc);
    }
  }
});

function clearChat() {
  stopAudio();
  chatMessages.innerHTML = '';
  const name = indexSelector.value || 'the knowledge base';
  chatMessages.innerHTML = '<div class="chat-msg system" id="chat-welcome">Ask a question about ' + name + '</div>';
  fetch('/api/forget', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chatId: activeChatId }),
  });
  if (typeof clearPath === 'function') clearPath();
}

// highlightPath and focusNode are defined in graph-viz.html (vis-network)
// No need to redefine them here.

// ── Voice: STT (Web Speech API) + TTS (Amazon Polly) ─────

const micBtn = document.getElementById('mic-btn');
const speakerBtn = document.getElementById('speaker-toggle');

let ttsEnabled = false;
let currentAudio = null;
let sttRecognition = null;

const speakerSvgOff = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
const speakerSvgOn = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';

function toggleTts() {
  ttsEnabled = !ttsEnabled;
  speakerBtn.classList.toggle('active', ttsEnabled);
  speakerBtn.innerHTML = ttsEnabled ? speakerSvgOn : speakerSvgOff;
  if (!ttsEnabled) stopAudio();
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  ttsAudioQueue = [];
  ttsIsPlaying = false;
  ttsBuffer = '';
}

// ── STT: Browser Web Speech API ──────────────────────────

function toggleMic() {
  if (sttRecognition) {
    sttRecognition.stop();
    sttRecognition = null;
    micBtn.classList.remove('recording');
    chatInput.placeholder = 'Ask a question...';
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addMessage('system', 'Voice input not available in this browser');
    return;
  }

  stopAudio();
  sttRecognition = new SpeechRecognition();
  sttRecognition.lang = 'en-AU';
  sttRecognition.interimResults = true;
  sttRecognition.maxAlternatives = 1;

  micBtn.classList.add('recording');
  chatInput.placeholder = 'Listening...';

  sttRecognition.onresult = (event) => {
    let transcript = '';
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    chatInput.value = transcript;
    if (event.results[event.results.length - 1].isFinal) {
      micBtn.classList.remove('recording');
      chatInput.placeholder = 'Ask a question...';
      sttRecognition = null;
      if (chatInput.value.trim()) sendMessage();
    }
  };

  sttRecognition.onerror = () => {
    micBtn.classList.remove('recording');
    chatInput.placeholder = 'Ask a question...';
    sttRecognition = null;
    addMessage('system', 'Voice recognition failed');
  };

  sttRecognition.onend = () => {
    micBtn.classList.remove('recording');
    chatInput.placeholder = 'Ask a question...';
    sttRecognition = null;
  };

  sttRecognition.start();
}

// ── TTS: Amazon Polly (sentence-by-sentence streaming) ───

let ttsBuffer = '';
let ttsAudioQueue = [];
let ttsIsPlaying = false;
let lastSpokenText = '';

function cleanTtsText(t) {
  return t.replace(/\[Source \d+\]/g, '').replace(/\*\*(.+?)\*\*/g, '$1').trim();
}

function onStreamToken(token) {
  if (!ttsEnabled) return;
  ttsBuffer += token;
  let match;
  while ((match = ttsBuffer.match(/^([\s\S]*?[.!?])\s/))) {
    const sentence = cleanTtsText(match[1]);
    ttsBuffer = ttsBuffer.slice(match[0].length);
    if (sentence) enqueueTts(sentence);
  }
}

function flushTtsBuffer() {
  if (!ttsEnabled) return;
  const remaining = cleanTtsText(ttsBuffer);
  ttsBuffer = '';
  if (remaining) enqueueTts(remaining);
}

async function enqueueTts(text) {
  try {
    const resp = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();
    if (data.audioContent) {
      const audioSrc = 'data:audio/mp3;base64,' + data.audioContent;
      ttsAudioQueue.push(audioSrc);
      playNextTts();
    }
  } catch (e) {
    // Silent fail on TTS errors
  }
}

function playNextTts() {
  if (ttsIsPlaying || ttsAudioQueue.length === 0) return;
  ttsIsPlaying = true;
  const src = ttsAudioQueue.shift();
  currentAudio = new Audio(src);
  currentAudio.onended = () => {
    currentAudio = null;
    ttsIsPlaying = false;
    playNextTts();
  };
  currentAudio.onerror = () => {
    currentAudio = null;
    ttsIsPlaying = false;
    playNextTts();
  };
  currentAudio.play();
}

// ── Feedback ─────────────────────────────────────────────

function submitFeedback(btn, type) {
  const msgDiv = btn.closest('.chat-msg');
  const memoryId = msgDiv && msgDiv.dataset.memoryId;
  if (!memoryId) return;

  const bar = btn.closest('.feedback-bar');

  if (type === 'positive') {
    fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memoryId, type: 'positive' }),
    }).catch(() => {});
    bar.outerHTML = '<div class="feedback-confirmed">Thanks for the feedback</div>';
  } else {
    // Disable buttons while form is shown
    bar.querySelectorAll('.feedback-btn').forEach(b => b.disabled = true);
    showFeedbackForm(msgDiv, memoryId);
  }
}

function showFeedbackForm(msgDiv, memoryId) {
  const existing = msgDiv.querySelector('.feedback-form');
  if (existing) return;

  const form = document.createElement('div');
  form.className = 'feedback-form';
  form.innerHTML =
    '<div style="margin-bottom:6px;font-weight:500;">What went wrong?</div>' +
    '<label><input type="radio" name="fb-' + memoryId + '" value="wrong-answer-wrong-docs">Wrong answer, wrong documents</label>' +
    '<label><input type="radio" name="fb-' + memoryId + '" value="wrong-answer-right-docs">Wrong answer, right documents</label>' +
    '<label><input type="radio" name="fb-' + memoryId + '" value="right-answer-wrong-docs">Right answer, wrong documents</label>' +
    '<label><input type="radio" name="fb-' + memoryId + '" value="incomplete-answer">Incomplete answer</label>' +
    '<textarea placeholder="Additional details (optional)"></textarea>' +
    '<button onclick="sendNegativeFeedback(this)">Submit</button>';
  form.dataset.memoryId = memoryId;
  msgDiv.appendChild(form);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── Auth: user display + sign out ─────────────────────────

if (window.__USER__) {
  const nameEl = document.getElementById('user-name');
  nameEl.textContent = window.__USER__.name || window.__USER__.email;
  nameEl.style.display = 'inline';
  if (window.__USER__.isAdmin) {
    const adminLink = document.createElement('a');
    adminLink.href = '/admin';
    adminLink.textContent = 'Admin';
    adminLink.style.cssText = 'font-family:Inter,sans-serif;font-size:11px;color:#2a5a9a;font-weight:500;text-decoration:none;padding:4px 10px;border:1px solid #ddd;border-radius:4px;transition:all 0.15s;';
    adminLink.onmouseover = function() { this.style.borderColor = '#999'; };
    adminLink.onmouseout = function() { this.style.borderColor = '#ddd'; };
    const signoutBtn = document.getElementById('signout-btn');
    signoutBtn.parentNode.insertBefore(adminLink, signoutBtn);
  }
  document.getElementById('signout-btn').style.display = 'inline-block';
}

function signOut() {
  fetch('/api/auth/logout', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      if (data.logoutUrl) {
        window.location.href = data.logoutUrl;
      } else {
        window.location.reload();
      }
    })
    .catch(() => { window.location.reload(); });
}

// ── Feedback: include credentials when auth enabled ──────

const fetchOpts = window.__USER__ ? { credentials: 'same-origin' } : {};

function sendNegativeFeedback(submitBtn) {
  const form = submitBtn.closest('.feedback-form');
  const memoryId = form.dataset.memoryId;
  const selected = form.querySelector('input[type="radio"]:checked');
  if (!selected) {
    submitBtn.textContent = 'Please select a category';
    setTimeout(() => { submitBtn.textContent = 'Submit'; }, 1500);
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';

  const category = selected.value;
  const comment = form.querySelector('textarea').value.trim() || null;

  fetch('/api/feedback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ memoryId, type: 'negative', category, comment }),
  })
    .then(r => r.json())
    .then(() => {
      const msgDiv = form.closest('.chat-msg');
      // Remove the feedback bar too
      const bar = msgDiv.querySelector('.feedback-bar');
      if (bar) bar.remove();
      form.outerHTML = '<div class="feedback-confirmed">Feedback recorded — this answer will be deprioritized</div>';
    })
    .catch(() => {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Retry';
    });
}
